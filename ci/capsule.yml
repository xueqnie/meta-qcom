# yaml-language-server: $schema=https://raw.githubusercontent.com/siemens/kas/master/kas/schema-kas.json
#
# Include this kas file to enable UEFI FMP capsule generation in the build.
# It sets QCOM_CAPSULE_FIRMWARE which wires firmware-qcom-capsule into the
# qcomflash image tarball via image_types_qcom.bbclass.
#
# Usage: kas build ci/base.yml:ci/<machine>.yml:ci/capsule.yml
#        kas build ci/base.yml:ci/<machine>.yml:ci/capsule.yml:ci/capsule-test-keys.yml

header:
  version: 14

# meta-oe provides the `openembedded-layer` collection name, which gates
# our local python3-pyfdt and qdte recipes under
# dynamic-layers/openembedded-layer/ (see conf/layer.conf BBFILES_DYNAMIC).
# meta-python is not required: pyfdt is shipped via the local recipe,
# and qdte's other runtime deps (fs, pyfatfs, tkinter) are stubbed by
# recipe-local patches when running --nogui.
repos:
  meta-openembedded:
    url: https://github.com/openembedded/meta-openembedded
    layers:
      meta-oe:

local_conf_header:
  capsule: |
    PREFERRED_PROVIDER_virtual/qcom-capsule-firmware = "firmware-qcom-capsule"
    VIRTUAL-RUNTIME_qcom-capsule-firmware = "firmware-qcom-capsule"
